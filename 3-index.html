<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: rgba(0, 128, 0, 0.3) /* Green background with 30% opacity */
        }

        p {
            background-color: rgb(111, 139, 8);
            color: rgb(255, 255, 255);
        }

        div {
            background-color: green;
        }

        div.first {
            opacity: 0.1;
        }

        div.second {
            opacity: 0.3;
        }

        div.third {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nam dignissimos, minus quibusdam architecto libero
        neque velit incidunt consequatur quis molestiae excepturi eius cum unde assumenda expedita. Ex eaque molestiae
        quaerat!
    </p>

    <div class="first">
        <h1>opacity 0.10</h1>
    </div>

    <div class="second">
        <h1>opacity 0.3</h1>
    </div>

    <div class="third">
        <h1>opacity 0.7</h1>
    </div>

    <div>
        <h1>opacity 1 (default)</h1>
    </div>
</body>

</html>
